name: abr_baseline

dataset:
  type: gcp_full
  source_regions:
    - us-east1
    - europe-west1
    - asia-northeast1
    - asia-south1
    - us-west1
  lambda_rate: 5.0
  mu_val: -2.0
  sigma_val: 2.0

simulation:
  n_builders: 5
  n_slots: 120
